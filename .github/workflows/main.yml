name: FreeXCraft Auto Renew

on:
  schedule:
    - cron: '5 */8 * * *'
  workflow_dispatch: # 手动触发按钮

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Smart Run (Immediate for Manual, 10s Random for Auto)
        env:
          FXC_EMAIL: ${{ secrets.FXC_EMAIL }}
          FXC_PASS: ${{ secrets.FXC_PASS }}
          FXC_SERVER_ID: ${{ secrets.FXC_SERVER_ID }}
          FXC_ACTION_ID: ${{ secrets.FXC_ACTION_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 检查触发事件的类型
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "🚀 检测到手动触发，立即执行续期！"
            python main.py
          else
            # 随机等待 1 到 10 秒，不再傻等一小时
            delay=$((1 + RANDOM % 10))
            printdate=$(date -d "+8 hours" "+%Y-%m-%d %H:%M:%S")
            echo "⏰ 定时任务触发 (北京时间: $printdate)"
            echo "💤 随机等待 $delay 秒后开始..."
            sleep $delay
            python main.py
          fi

      - name: Heartbeat commit
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull origin main || true
          echo "Last run: $(date -u)" > heartbeat.txt
          git add heartbeat.txt
          git commit -m "heartbeat $(date -u)" || echo "No changes"
          git push origin HEAD:main    
